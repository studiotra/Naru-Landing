<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Article — Naru</title>
<meta name="description" content="Insights from Naru on Korea–Canada clean energy and biotech." />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../assets/article.css" />
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="/">Naru</a>
      <a class="back-link" href="/#insights">Back to insights</a>
    </div>
  </header>

  <main id="article-root">
    <section class="hero">
      <div class="shell">
        <p class="text-sm text-[color:var(--mist)]">Loading article…</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="shell">Naru — Korea-Canada market entry, partnership, and cross-border commercialization.</div>
  </footer>

  <script>
    function articleSlugFromPath() {
      const parts = window.location.pathname.replace(/\/$/, '').split('/');
      const slug = parts[parts.length - 1];
      return slug && slug !== 'view.html' ? slug : '';
    }

    function thumbSrc(thumbnail) {
      if (!thumbnail) return '../assets/bridging-the-pacific-thumbnail.png';
      if (thumbnail.startsWith('http')) return thumbnail;
      const path = thumbnail.startsWith('/') ? thumbnail : '/' + thumbnail;
      return path.startsWith('/assets') ? '..' + path : path;
    }

    function renderArticle(article) {
      const metaLine = [article.dateLabel, article.readTime].filter(Boolean).join(' · ');
      const thumb = thumbSrc(article.thumbnail);

      document.title = article.title + ' — Naru';
      const desc = article.excerpt || article.title;
      document.querySelector('meta[name="description"]').setAttribute('content', desc);

      let ogTitle = document.querySelector('meta[property="og:title"]');
      if (!ogTitle) {
        ogTitle = document.createElement('meta');
        ogTitle.setAttribute('property', 'og:title');
        document.head.appendChild(ogTitle);
      }
      ogTitle.setAttribute('content', article.title);

      document.getElementById('article-root').innerHTML = `
    <section class="hero">
      <div class="shell">
        <div class="hero-grid">
          <div>
            <div class="eyebrow">${article.category}${metaLine ? ' · ' + metaLine : ''}</div>
            <h1 class="display">${article.title}</h1>
            <p class="dek">${article.excerpt || ''}</p>
            <div class="meta">
              <span>${article.author || 'Naru Desk'}</span>
              ${article.readTime ? '<span>' + article.readTime + '</span>' : ''}
            </div>
          </div>
          <figure class="hero-card">
            <img src="${thumb}" alt="${article.thumbnailAlt || article.title}" />
            <figcaption>${article.category}${article.dateLabel ? ' · ' + article.dateLabel : ''}</figcaption>
          </figure>
        </div>
      </div>
    </section>

    <section class="article-wrap">
      <div class="shell article-grid">
        <article class="article cms-body">
          ${article.bodyHtml || ''}
          <section class="cta">
            <h3>Exploring a Korea-Canada partnership?</h3>
            <p>Naru supports Korean ventures entering Canada and Canadian partners seeking Korean technology and capital across clean energy and biotech.</p>
            <div class="cta-actions">
              <a class="btn btn-primary" href="mailto:info@narulanding.com">Contact Naru</a>
              <a class="btn btn-secondary" href="/">View main site</a>
            </div>
          </section>
        </article>
        <aside class="aside">
          <div class="aside-card">
            <h3>About this piece</h3>
            <p>${article.excerpt || ''}</p>
          </div>
          <div class="aside-card">
            <h3>Contact</h3>
            <p>Email: <a href="mailto:info@narulanding.com">info@narulanding.com</a><br>
            Web: <a href="https://narulanding.com">narulanding.com</a><br>
            Phone: <a href="tel:+14374358730">+1 (437) 435-8730</a></p>
          </div>
        </aside>
      </div>
    </section>`;
    }

    async function loadArticle() {
      const slug = articleSlugFromPath();
      const root = document.getElementById('article-root');

      if (!slug) {
        root.innerHTML = '<section class="hero"><div class="shell"><p>Article not found.</p></div></section>';
        return;
      }

      try {
        const response = await fetch('/api/article?slug=' + encodeURIComponent(slug));
        if (!response.ok) {
          throw new Error('not found');
        }
        const article = await response.json();
        renderArticle(article);
      } catch (error) {
        root.innerHTML =
          '<section class="hero"><div class="shell"><h1 class="display">Article not found</h1><p class="dek mt-4"><a href="/#insights">Back to insights</a></p></div></section>';
      }
    }

    loadArticle();
  </script>
</body>
</html>
